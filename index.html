<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#맘찍한트친에게마이붐음악하나씩투척하기</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f8;
      --white: #ffffff;
      --gray-100: #f2f2f4;
      --gray-200: #e5e5ea;
      --gray-300: #d1d1d6;
      --gray-400: #aeaeb2;
      --gray-500: #8e8e93;
      --gray-700: #3a3a3c;
      --gray-900: #1c1c1e;
      --accent: #ff3b30;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      --shadow-artwork: 0 16px 48px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.10);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--gray-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .container {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    /* Login */
    #login-screen {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow-sm);
    }
    #login-screen h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--gray-900);
    }
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex: 1;
      background: var(--gray-100);
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .input-row input:focus { border-color: var(--gray-300); background: var(--white); }
    .input-row input::placeholder { color: var(--gray-400); }
    .btn-go {
      background: var(--gray-900);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-go:hover { opacity: 0.82; }
    .btn-go:active { transform: scale(0.96); }
    .error-msg { margin-top: 10px; font-size: 12px; color: var(--accent); min-height: 16px; }

    /* Player */
    #player-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
    .artwork-wrap {
      width: 100%; aspect-ratio: 1;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-artwork);
      background: var(--gray-200);
      margin-bottom: 28px;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .artwork-wrap.paused { transform: scale(0.90); }
    .artwork-wrap.playing { transform: scale(1.0); }
    .artwork-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .artwork-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px; background: var(--gray-100);
    }
    .song-info {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }
    .song-text { flex: 1; min-width: 0; }
    .song-title {
      font-size: 19px; font-weight: 700; letter-spacing: -0.3px;
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-for { font-size: 13px; color: var(--gray-500); }
    .love-btn {
      background: none; border: none; font-size: 24px; cursor: pointer;
      color: var(--gray-300); padding: 6px;
      transition: color 0.18s, transform 0.12s; line-height: 1; flex-shrink: 0;
    }
    .love-btn.loved { color: var(--accent); }
    .love-btn:active { transform: scale(1.3); }
    .progress-section { width: 100%; margin-bottom: 8px; }
    .progress-bar-wrap {
      position: relative; height: 3px;
      background: var(--gray-200); border-radius: 2px;
      cursor: pointer; margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%; background: var(--gray-900); border-radius: 2px;
      width: 0%; transition: width 0.4s linear; position: relative;
    }
    .progress-fill::after {
      content: ''; position: absolute; right: -5px; top: 50%;
      transform: translateY(-50%); width: 10px; height: 10px;
      background: var(--gray-900); border-radius: 50%;
      opacity: 0; transition: opacity 0.12s;
    }
    .progress-bar-wrap:hover .progress-fill::after { opacity: 1; }
    .progress-range {
      position: absolute; inset: -10px 0;
      opacity: 0; cursor: pointer; width: 100%;
    }
    .time-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--gray-400);
      font-variant-numeric: tabular-nums; font-weight: 500;
    }
    .volume-section {
      width: 100%; display: flex; align-items: center;
      gap: 8px; margin-bottom: 24px; margin-top: 4px;
    }
    .vol-icon { font-size: 13px; color: var(--gray-400); }
    .volume-range {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; background: var(--gray-200); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    .volume-range::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--gray-700); cursor: pointer;
    }
    .controls {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 28px;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; color: var(--gray-700);
      padding: 10px; border-radius: 50%;
      transition: background 0.12s, opacity 0.12s;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { background: var(--gray-100); }
    .ctrl-btn:active { opacity: 0.5; }
    .btn-play-pause {
      width: 62px; height: 62px; background: var(--gray-900);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none;
      transition: transform 0.1s, opacity 0.12s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15); flex-shrink: 0;
    }
    .btn-play-pause:active { transform: scale(0.93); }
    .btn-play-pause svg { color: #fff; }
    .divider { width: 100%; height: 1px; background: var(--gray-200); margin-bottom: 20px; }
    .playlist-label {
      width: 100%; font-size: 11px; font-weight: 600;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--gray-400); margin-bottom: 10px;
    }
    .playlist { width: 100%; display: flex; flex-direction: column; gap: 2px; }
    .playlist-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 10px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background 0.12s;
    }
    .playlist-item:hover { background: var(--gray-100); }
    .playlist-item.active { background: var(--gray-100); }
    .pl-num {
      font-size: 12px; color: var(--gray-400);
      width: 16px; text-align: center; flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .playlist-item.active .pl-num { color: var(--accent); }
    .pl-thumb {
      width: 42px; height: 42px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; background: var(--gray-200);
    }
    .pl-info { flex: 1; min-width: 0; }
    .pl-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--gray-900);
    }
    .playlist-item.active .pl-title { color: var(--accent); font-weight: 600; }
    .pl-sub { font-size: 12px; color: var(--gray-500); margin-top: 1px; }
    .footer-row { width: 100%; display: flex; justify-content: flex-end; margin-top: 16px; }
    .btn-back {
      background: none; border: 1.5px solid var(--gray-200);
      color: var(--gray-500); border-radius: var(--radius-sm);
      padding: 7px 14px; font-size: 12px; font-weight: 500;
      font-family: inherit; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-back:hover { border-color: var(--gray-400); color: var(--gray-700); }
    #yt-player { display: none; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>

<div class="container">
  <div id="login-screen">
    <h2>아이디를 입력하세요.</h2>
    <div class="input-row">
      <input type="text" id="id-input" placeholder="아이디 입력"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
      <button class="btn-go" onclick="login()">열기</button>

      <button class="ctrl-btn" onclick="prevTrack()">

  </div>
</div>

<div id="yt-player"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player = null, ytReady = false;
let currentVideoId = null, isPlaying = false;
let progressTimer = null;
let currentNickname = '';

function onYouTubeIframeAPIReady() {
  ytReady = true;
  player = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, iv_load_policy: 3, rel: 0 },
    events: { onStateChange: onPlayerStateChange }
  });
}

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    setPlayIcon(true);
    document.getElementById('artwork-wrap').className = 'artwork-wrap playing';
    startProgress();
  }
  if (e.data === YT.PlayerState.PAUSED) {
    setPlayIcon(false);
    document.getElementById('artwork-wrap').className = 'artwork-wrap paused';
  }
}

function login() {
  const raw = document.getElementById('id-input').value.trim();
  const id = raw.replace(/^@/, '').toLowerCase();
  const err = document.getElementById('error-msg');

  // cookie: 전체 랜덤
  if (id === 'cookie') {
    const keys = Object.keys(USER_PLAYLISTS);
    const randomKey = keys[Math.floor(Math.random() * keys.length)];
    const track = USER_PLAYLISTS[randomKey];
    err.textContent = '';
    showPlayer(track.title, track.videoId, track.nickname, track.artwork);
    return;
  }

  if (!USER_PLAYLISTS[id]) { err.textContent = '다시 입력해 주세요.'; return; }
  err.textContent = '';
  const track = USER_PLAYLISTS[id];
  showPlayer(track.title, track.videoId, track.nickname, track.artwork);
}

function showPlayer(title, videoId, nickname, artwork) {
  currentVideoId = videoId;
  currentNickname = nickname;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('player-screen').style.display = 'flex';
  const sub = '@' + nickname + '에게 추천된 곡';
  document.getElementById('song-title').textContent = title;
  document.getElementById('song-for').textContent = sub;

  const img = document.getElementById('artwork-img');
  const ph = document.getElementById('artwork-placeholder');
  img.style.display = 'block'; ph.style.display = 'none';
  if (artwork) {
    img.src = artwork;
    img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
  } else {
    img.src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    img.onerror = function() {
      img.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
    };
  }

  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-range').value = 0;
  document.getElementById('time-current').textContent = '0:00';
  document.getElementById('time-total').textContent = '0:00';
  document.getElementById('love-btn').className = 'love-btn';
  document.getElementById('love-btn').textContent = '♡';

  // playlist: single track
  const pl = document.getElementById('playlist');
  const thumb = artwork || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
  pl.innerHTML = `
    <div class="playlist-item active">
      <span class="pl-num">1</span>
      <img class="pl-thumb" src="${thumb}" alt="" onerror="this.style.opacity='0'" />
      <div class="pl-info">
        <div class="pl-title">${title}</div>
        <div class="pl-sub">${sub}</div>
      </div>
    </div>`;

  if (!ytReady || !player || !player.cueVideoById) {
    setTimeout(() => showPlayer(title, videoId, nickname, artwork), 500); return;
  }
  player.cueVideoById(videoId);
  setPlayIcon(false);
  document.getElementById('artwork-wrap').className = 'artwork-wrap paused';
  player.setVolume(parseInt(document.getElementById('volume-range').value));
}

function goBack() {
  isPlaying = false;
  if (player && player.stopVideo) player.stopVideo();
  clearInterval(progressTimer);
  document.getElementById('player-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('id-input').value = '';
  setPlayIcon(false);
}

function togglePlay() {
  if (!player || !player.getPlayerState) return;
  if (player.getPlayerState() === YT.PlayerState.PLAYING) { player.pauseVideo(); isPlaying = false; }
  else { player.playVideo(); isPlaying = true; }
}

function setPlayIcon(playing) {
  document.getElementById('icon-play').style.display = playing ? 'none' : 'block';
  document.getElementById('icon-pause').style.display = playing ? 'block' : 'none';
}

function prevTrack() {}
function nextTrack() {}

function startProgress() {
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    if (!player || !player.getDuration) return;
    const dur = player.getDuration(), cur = player.getCurrentTime();
    if (dur > 0) {
      const pct = (cur / dur) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-range').value = pct;
      document.getElementById('time-current').textContent = fmt(cur);
      document.getElementById('time-total').textContent = fmt(dur);
    }
  }, 500);
}

document.getElementById('progress-range').addEventListener('input', function() {
  if (!player || !player.getDuration) return;
  player.seekTo((this.value / 100) * player.getDuration(), true);
  document.getElementById('progress-fill').style.width = this.value + '%';
});

document.getElementById('volume-range').addEventListener('input', function() {
  if (player && player.setVolume) player.setVolume(parseInt(this.value));
});

function toggleLove() {
  const btn = document.getElementById('love-btn');
  btn.classList.toggle('loved');
  btn.textContent = btn.classList.contains('loved') ? '♥' : '♡';
}

function fmt(s) { return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

document.getElementById('id-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
